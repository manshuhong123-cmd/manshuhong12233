<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.webmanifest">
    <title>考古影像采集系统</title>
</head>
<body>
    <h1>欢迎使用考古影像采集系统</h1>
    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(function() {
                    console.log('Service Worker registered successfully.');
                })
                .catch(function(error) {
                    console.log('Service Worker registration failed:', error);
                });
        }

        // IndexedDB example to store data
        let db;
        const request = indexedDB.open('archaeologyDB', 1);

        request.onupgradeneeded = function(event) {
            db = event.target.result;
            const objectStore = db.createObjectStore('images', {keyPath: 'id'});
            objectStore.createIndex('url', 'url', {unique: true});
        };

        request.onsuccess = function(event) {
            db = event.target.result;
            console.log('Database opened successfully.');
        };

        // Function to export data as ZIP (placeholder)
        function exportData() {
            console.log('Export data function to be implemented.');
        }
    </script>
</body>
</html>
